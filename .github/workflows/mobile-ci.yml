name: Mobile Automation CI/CD - Desafio Outsera

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags Cucumber (ex: @smoke, @regression, @checkout)'
        required: false
        default: '@smoke'
      platform:
        description: 'Plataforma (android / ios)'
        required: false
        default: 'android'

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  ANDROID_API_LEVEL: 31
  APK_URL: 'https://github.com/saucelabs/sample-app-mobile/releases/download/2.7.1/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk'

jobs:

  # ─────────────────────────────────────────────────────────────────
  # Job 1: Build & Compilação
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build & Compilação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Compilar
        run: mvn compile test-compile --no-transfer-progress

      - name: Validar estrutura
        run: mvn validate --no-transfer-progress

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Testes no Emulador Android
  # ─────────────────────────────────────────────────────────────────
  test-android:
    name: Testes Android
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Habilitar KVM (aceleração do emulador)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Criar AVD
        run: |
          echo "y" | sdkmanager --install \
            "system-images;android-${{ env.ANDROID_API_LEVEL }};google_apis;x86_64" \
            --channel=0
          echo "no" | avdmanager create avd \
            --force \
            --name "ci_avd" \
            --device "pixel_4" \
            --package "system-images;android-${{ env.ANDROID_API_LEVEL }};google_apis;x86_64" \
            --abi "google_apis/x86_64"

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar Appium 2 + UiAutomator2
        run: |
          npm install -g appium@2.5.4
          appium driver install uiautomator2@2.9.1
          echo "Node versão:   $(node --version)"
          echo "Appium versão: $(appium --version)"
          appium driver list --installed

      - name: Download APK
        run: |
          mkdir -p apps reports
          curl -fsSL "${{ env.APK_URL }}" -o apps/swag-labs.apk
          echo "APK: $(ls -lh apps/swag-labs.apk)"

      # FIX: Appium é iniciado e encerrado DENTRO do script do emulator-runner
      # para garantir que nenhum processo fique orphan após os testes.
      - name: Executar Testes
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          target: google_apis
          arch: x86_64
          profile: pixel_4
          avd-name: ci_avd
          disable-animations: true
          # FIX: emulator-options em linha única — YAML '>' junta com espaço
          # mas alguns runners interpretam as quebras como argumentos separados.
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -wipe-data
          script: |
            set -e

            echo "Aguardando emulador ficar pronto..."
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done'
            echo "Emulador pronto: $(adb devices)"

            echo "Iniciando Appium em background..."
            appium --address 127.0.0.1 --port 4723 --log reports/appium.log --log-timestamp --log-no-colors &
            APPIUM_PID=$!
            echo "Appium PID: $APPIUM_PID"

            echo "Aguardando Appium inicializar..."
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:4723/status > /dev/null 2>&1; then
                echo "Appium respondendo após ${i}s"
                break
              fi
              echo "  tentativa $i/15..."
              sleep 1
            done

            curl -s http://127.0.0.1:4723/status | python3 -m json.tool

            echo "Executando testes Maven..."
            # FIX: mvn em linha única — barras '\\' dentro do script: do emulator-runner
            # são interpretadas literalmente pelo runner, causando erro de argumento.
            mvn test -Dplatform=android -DappiumUrl=http://127.0.0.1:4723 -DdeviceName="emulator-5554" -DplatformVersion="12.0" -Dcucumber.filter.tags="${{ github.event.inputs.tags || '@smoke' }}" --no-transfer-progress
            MAVEN_EXIT=$?

            # FIX PRINCIPAL: Encerrar o Appium explicitamente antes do
            # emulator-runner tentar matar o emulador — evita o travamento.
            echo "Encerrando Appium (PID $APPIUM_PID)..."
            kill $APPIUM_PID 2>/dev/null || true
            wait $APPIUM_PID 2>/dev/null || true
            echo "Appium encerrado."

            # FIX: Forçar desconexão do ADB antes do shutdown do emulador
            echo "Desconectando ADB..."
            adb -s emulator-5554 emu kill 2>/dev/null || true
            sleep 3
            adb kill-server 2>/dev/null || true

            echo "Script finalizado com código $MAVEN_EXIT"
            exit $MAVEN_EXIT

      # FIX: Garantir limpeza mesmo em caso de falha
      - name: Encerrar processos residuais
        if: always()
        run: |
          echo "Limpando processos residuais..."
          pkill -f "appium" 2>/dev/null || true
          pkill -f "qemu-system" 2>/dev/null || true
          pkill -f "emulator" 2>/dev/null || true
          adb kill-server 2>/dev/null || true
          echo "Limpeza concluída."

      - name: Upload Artefatos (ExtentReports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Deploy to GitHub Pages (ExtentReports)
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: gh-pages

  # ─────────────────────────────────────────────────────────────────
  # Job 3: Sumário - Publicação do Relatório
  # ─────────────────────────────────────────────────────────────────
  summary:
    name: Sumário
    runs-on: ubuntu-latest
    needs: test-android
    if: always()

    steps:
      - name: Escrever sumário
        run: |
          echo "## Mobile Automation — Resultados" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo         | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch        | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit        | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run #         | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java          | ${{ env.JAVA_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node          | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plataforma    | Android API ${{ env.ANDROID_API_LEVEL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags          | \`${{ github.event.inputs.tags || '@smoke' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Relatório     | [ExtentReports](https://rogerpdas.github.io/outsera-automacao-testes-mobile/) |" >> $GITHUB_STEP_SUMMARY
          echo "> Artefatos disponíveis por 30 dias na aba **Actions**." >> $GITHUB_STEP_SUMMARY
