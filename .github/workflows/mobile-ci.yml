name: 📱 Mobile Automation CI/CD - Desafio Outsera

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags Cucumber (ex: @smoke, @regression, @checkout)'
        required: false
        default: '@smoke'
      platform:
        description: 'Plataforma (android / ios)'
        required: false
        default: 'android'

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  ANDROID_API_LEVEL: 31
  APK_URL: 'https://github.com/saucelabs/sample-app-mobile/releases/download/2.7.1/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk'

jobs:

  # ─────────────────────────────────────────────────────────────────
  # Job 1: Build & Compilação
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build & Compilação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Compilar
        run: mvn compile test-compile --no-transfer-progress

      - name: Validar estrutura
        run: mvn validate --no-transfer-progress

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Testes no Emulador Android
  # ─────────────────────────────────────────────────────────────────
  test-android:
    name: Testes Android
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Habilitar KVM (aceleração do emulador)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Criar AVD
        run: |
          echo "y" | sdkmanager --install \
            "system-images;android-${{ env.ANDROID_API_LEVEL }};google_apis;x86_64" \
            --channel=0
          echo "no" | avdmanager create avd \
            --force \
            --name "ci_avd" \
            --device "pixel_4" \
            --package "system-images;android-${{ env.ANDROID_API_LEVEL }};google_apis;x86_64" \
            --abi "google_apis/x86_64"

      - name: Verificar emulador (health-check)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          target: google_apis
          arch: x86_64
          profile: pixel_4
          avd-name: ci_avd
          disable-animations: true
          emulator-options: >
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          script: |
            adb wait-for-device
            echo "Emulador pronto: $(adb devices)"

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar Appium 2 + UiAutomator2
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          echo "Appium versão: $(appium --version)"

      - name: Download APK
        run: |
          mkdir -p apps
          curl -fsSL "${{ env.APK_URL }}" -o apps/swag-labs.apk
          echo "APK: $(ls -lh apps/swag-labs.apk)"

      - name: Iniciar Appium Server
        run: |
          appium --address 127.0.0.1 --port 4723 --log reports/appium.log &
          sleep 5
          curl -s http://127.0.0.1:4723/status | python3 -m json.tool

      - name: Executar Testes
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          target: google_apis
          arch: x86_64
          profile: pixel_4
          avd-name: ci_avd
          disable-animations: true
          emulator-options: >
            -no-snapshot-save -no-window -gpu swiftshader_indirect
            -noaudio -no-boot-anim -camera-back none
          script: |
            mvn test \
              -Dplatform=android \
              -DappiumUrl=http://127.0.0.1:4723 \
              -DdeviceName="emulator-5554" \
              -DplatformVersion="12.0" \
              -Dcucumber.filter.tags="${{ github.event.inputs.tags || '@smoke' }}" \
              --no-transfer-progress

      - name: Upload Artefatos (ExtentReports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Deploy to GitHub Pages (ExtentReports)
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: gh-pages

  # ─────────────────────────────────────────────────────────────────
  # Job 3: Sumário - Publicação do Relatório
  # ─────────────────────────────────────────────────────────────────
  summary:
    name: Sumário
    runs-on: ubuntu-latest
    needs: test-android
    if: always()

    steps:
      - name: Escrever sumário
        run: |
          echo "## 📱 Mobile Automation — Resultados" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo         | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch        | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit        | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run #         | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java          | ${{ env.JAVA_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plataforma    | Android API ${{ env.ANDROID_API_LEVEL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags          | \`${{ github.event.inputs.tags || '@smoke' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Relatório     | [ExtentReports](https://rogerpdas.github.io/outsera-automacao-testes-mobile/|" >> $GITHUB_STEP_SUMMARY
          echo "> 📦 Artefatos disponíveis por 30 dias na aba **Actions**." >> $GITHUB_STEP_SUMMARY
